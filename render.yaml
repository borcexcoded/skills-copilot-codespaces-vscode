services:
  - type: web
    name: attend-api
    runtime: docker
    repo: https://github.com/borcexcoded/skills-copilot-codespaces-vscode
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        value: sqlite:///attendance.db
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /api/health
    plan: free
